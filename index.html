<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book an Appointment · YooshMD</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #FFFDF5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Header ── */
    .header {
      background: #4A0E0E;
      color: #FFFDF5;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.65;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }

    .header-desc {
      font-size: 12px;
      opacity: 0.7;
      line-height: 1.4;
      max-width: 420px;
    }

    .header-price {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .header-price-amount {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }

    .header-price-label {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 2px;
    }

    .header-badge {
      display: inline-block;
      background: rgba(255, 253, 245, 0.15);
      border: 1px solid rgba(255, 253, 245, 0.25);
      color: #FFFDF5;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      margin-top: 4px;
    }

    /* ── iframe ── */
    .frame-container {
      width: 100%;
      height: calc(100vh - 80px);
    }

    .frame-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #FFFDF5;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .header {
        padding: 12px 16px;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .header-price {
        align-items: flex-start;
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }

      .header-price-amount {
        font-size: 22px;
      }

      .header-price-label {
        margin-top: 0;
      }

      .header-desc {
        display: none;
      }

      .frame-container {
        height: calc(100vh - 110px);
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="header-label">Video Visit · 30 minutes</span>
      <span class="header-title">Consultation with Dr. Roohani</span>
      <span class="header-desc">Review your history, set your goals, and get a personalized medication and program plan. No ongoing commitment until you decide to continue.</span>
    </div>
    <div class="header-price">
      <span class="header-price-amount">$99</span>
      <span class="header-price-label">one-time</span>
      <span class="header-badge">No commitment</span>
    </div>
  </header>

  <div class="frame-container">
    <iframe
      src="https://droohani.drchrono.com/scheduling/offices/dGhpcyBpcyAxNiBjaGFycysPOFfshC0Hi1g202sXmtQ%3D"
      allowfullscreen
      title="Book an appointment at YooshMD"
    ></iframe>
  </div>

</body>
</html>
